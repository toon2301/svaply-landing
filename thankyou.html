<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Ďakujeme za prihlásenie – Svaply čoskoro spúšťame.">
  <title>Svaply – Ďakujeme</title>
  <link rel="icon" href="svaply-icon.png" type="image/png">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #7C3AED;
      --primary-dark: #5B21B6;
      --primary-light: #8B5CF6;
      --bg: #F9FAFB;
      --text: #111827;
      --text-muted: #6B7280;
      --border: #E5E7EB;
      --white: #FFFFFF;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100dvh;
    }

    .page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      width: 100%;
      padding:
        max(1.5rem, env(safe-area-inset-top))
        clamp(1.25rem, 4vw, 2.5rem)
        max(1.5rem, env(safe-area-inset-bottom));
    }

    .page-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 36rem;
      text-align: center;
      gap: clamp(1.25rem, 3.5vh, 1.75rem);
    }

    .logo {
      display: block;
      line-height: 0;
      text-decoration: none;
    }

    .logo-img {
      display: block;
      height: clamp(5rem, 22vw, 9rem);
      width: auto;
      margin: 0 auto;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      width: 100%;
    }

    .message h1 {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
    }

    .message p {
      font-size: clamp(1rem, 2.5vw, 1.125rem);
      color: var(--text-muted);
      white-space: pre-line;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 3rem;
      padding: 0 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--white);
      background-color: var(--primary);
      border: none;
      border-radius: 0.625rem;
      text-decoration: none;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.15s;
    }

    .btn-back:hover {
      background-color: var(--primary-dark);
    }

    .btn-back:active {
      transform: scale(0.98);
    }

    .lang-switch {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 24rem;
      gap: 0.25rem;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 0.35rem;
    }

    .lang-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 2rem;
      font-family: inherit;
      font-size: 0.6875rem;
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.03em;
      padding: 0.5rem 0.2rem;
      border: none;
      border-radius: 9999px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      text-align: center;
      transition: background 0.2s, color 0.2s;
    }

    .lang-btn:hover { color: var(--text); }

    .lang-btn.active {
      background: var(--primary);
      color: var(--white);
    }

    .social {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .social a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 50%;
      background: var(--white);
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .social a:hover {
      color: var(--primary);
      border-color: var(--primary-light);
      background: rgba(124, 58, 237, 0.05);
    }

    .social svg {
      width: 1.25rem;
      height: 1.25rem;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="page-content">
    <a href="index.html" class="logo" aria-label="Svaply">
      <img src="svaply-logo.png" alt="Svaply" class="logo-img" width="240" height="125">
    </a>

    <div class="message">
      <h1 data-i18n="heading">Tešíme sa na teba!</h1>
      <p data-i18n="subtitle">Dáme ti vedieť hneď ako Svaply spustíme.</p>
    </div>

    <a href="index.html" class="btn-back" data-i18n="backBtn">Späť na hlavnú stránku</a>

    <div class="social">
      <a href="https://www.instagram.com/svaplyofficial/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
        </svg>
      </a>
      <a href="https://www.facebook.com/SvaplyOfficial" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
      </a>
    </div>

    <nav class="lang-switch" aria-label="Language">
      <button type="button" class="lang-btn" data-lang="sk" aria-pressed="false">SK</button>
      <button type="button" class="lang-btn" data-lang="cs" aria-pressed="false">CS</button>
      <button type="button" class="lang-btn" data-lang="hu" aria-pressed="false">HU</button>
      <button type="button" class="lang-btn" data-lang="pl" aria-pressed="false">PL</button>
      <button type="button" class="lang-btn" data-lang="de" aria-pressed="false">DE</button>
      <button type="button" class="lang-btn" data-lang="en" aria-pressed="false">EN</button>
    </nav>
    </div>
  </main>

  <script>
    (function () {
      var translations = {
        sk: {
          heading: 'Tešíme sa na teba!',
          subtitle: 'Dáme ti vedieť hneď ako Svaply spustíme.',
          backBtn: 'Späť na hlavnú stránku',
          pageTitle: 'Svaply – Ďakujeme',
          metaDescription: 'Ďakujeme za prihlásenie – Svaply čoskoro spúšťame.'
        },
        cs: {
          heading: 'Těšíme se na tebe!',
          subtitle: 'Dáme ti vědět, jakmile Svaply spustíme.',
          backBtn: 'Zpět na hlavní stránku',
          pageTitle: 'Svaply – Děkujeme',
          metaDescription: 'Děkujeme za přihlášení – Svaply brzy spouštíme.'
        },
        hu: {
          heading: 'Várunk rád!',
          subtitle: 'Szólunk, amint elindítjuk a Svaply-t.',
          backBtn: 'Vissza a főoldalra',
          pageTitle: 'Svaply – Köszönjük',
          metaDescription: 'Köszönjük a feliratkozást – a Svaply hamarosan indul.'
        },
        pl: {
          heading: 'Cieszymy się na Ciebie!',
          subtitle: 'Damy znać, gdy tylko uruchomimy Svaply.',
          backBtn: 'Wróć na stronę główną',
          pageTitle: 'Svaply – Dziękujemy',
          metaDescription: 'Dziękujemy za zapisanie się – Svaply wkrótce startuje.'
        },
        de: {
          heading: 'Wir freuen uns auf dich!',
          subtitle: 'Wir melden uns, sobald wir Svaply starten.',
          backBtn: 'Zurück zur Startseite',
          pageTitle: 'Svaply – Danke',
          metaDescription: 'Danke für deine Anmeldung – Svaply startet in Kürze.'
        },
        en: {
          heading: "We're excited to have you!",
          subtitle: "We'll let you know as soon as we launch Svaply.",
          backBtn: 'Back to home page',
          pageTitle: 'Svaply – Thank you',
          metaDescription: 'Thank you for signing up – Svaply is launching soon.'
        }
      };

      var LANG_KEY = 'svaply-lang';
      var SUPPORTED_LANGS = ['sk', 'cs', 'hu', 'pl', 'de', 'en'];
      var BROWSER_LANG_MAP = { sk: 'sk', cs: 'cs', hu: 'hu', pl: 'pl', de: 'de' };

      function detectBrowserLang() {
        var prefs = (navigator.languages && navigator.languages.length)
          ? navigator.languages
          : [navigator.language || 'en'];

        for (var i = 0; i < prefs.length; i++) {
          var code = String(prefs[i]).toLowerCase().split('-')[0];
          if (BROWSER_LANG_MAP[code]) return BROWSER_LANG_MAP[code];
        }
        return 'en';
      }

      function getInitialLang() {
        try {
          var stored = localStorage.getItem(LANG_KEY);
          if (stored && SUPPORTED_LANGS.indexOf(stored) !== -1) return stored;
        } catch (e) {}
        return detectBrowserLang();
      }

      function setLang(lang) {
        if (SUPPORTED_LANGS.indexOf(lang) === -1) return;
        var t = translations[lang];
        if (!t) return;

        document.documentElement.lang = lang;

        var els = document.querySelectorAll('[data-i18n]');
        for (var i = 0; i < els.length; i++) {
          var key = els[i].getAttribute('data-i18n');
          if (t[key]) els[i].textContent = t[key];
        }

        document.title = t.pageTitle;
        var metaDesc = document.querySelector('meta[name="description"]');
        if (metaDesc) metaDesc.setAttribute('content', t.metaDescription);

        var buttons = document.querySelectorAll('.lang-btn');
        for (var j = 0; j < buttons.length; j++) {
          var btn = buttons[j];
          var isActive = btn.getAttribute('data-lang') === lang;
          btn.classList.toggle('active', isActive);
          btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        }

        try {
          localStorage.setItem(LANG_KEY, lang);
        } catch (e) {}
      }

      document.addEventListener('click', function (e) {
        var btn = e.target.closest('.lang-btn');
        if (!btn) return;
        e.preventDefault();
        setLang(btn.getAttribute('data-lang'));
      });

      setLang(getInitialLang());
    })();
  </script>
</body>
</html>
